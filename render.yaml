services:
  # The FastAPI Backend API
  - type: web
    name: ai-tutor-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: GEMINI_API_KEY
        # You will set this to your free Google Gemini API key securely in the Render dashboard!
        sync: false
      
  # The Streamlit Frontend Website
  - type: web
    name: ai-tutor-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    # Run streamlit on the dynamically provided port
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: BACKEND_URL
        # This automatically pulls the newly generated URL of your backend on Render so the website knows who to talk to!
        fromService:
          type: web
          name: ai-tutor-backend
          envVarKey: RENDER_EXTERNAL_URL
